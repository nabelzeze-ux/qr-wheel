         <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎰 عجلة حظ X-Team Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        
        body {
            background: linear-gradient(180deg, #0a0a2e 0%, #0d0d35 50%, #0a0a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* نجوم متحركة في الخلفية */
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }
        
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 15px;
        }
        
        /* اسم البوت */
        .bot-name {
            font-size: 26px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00;
            letter-spacing: 4px;
            animation: glowText 2s ease-in-out infinite;
        }
        
        @keyframes glowText {
            0%, 100% { text-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00; }
            50% { text-shadow: 0 0 40px #ffd700, 0 0 80px #ff8c00, 0 0 120px #ff4500; }
        }
        
        /* العجلة */
        .wheel-wrapper {
            position: relative;
            width: min(340px, 90vw);
            height: min(340px, 90vw);
        }
        
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 0 30px rgba(255,215,0,0.3));
        }
        
        /* المؤشر - مثلث ذهبي من الأعلى */
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 35px solid #ffd700;
            z-index: 10;
            filter: drop-shadow(0 0 8px #ffd700);
        }
        
        /* الزر */
        .spin-btn {
            background: linear-gradient(180deg, #ffd700 0%, #ff8c00 100%);
            color: #1a1a2e;
            border: 3px solid #ffd700;
            padding: 14px 45px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(255,215,0,0.5), 0 5px 20px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        
        .spin-btn:active {
            transform: scale(0.95);
        }
        
        .spin-btn:disabled {
            background: #444;
            color: #888;
            border-color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        /* نافذة الفوز */
        .win-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 99;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .win-overlay.show { display: flex; }
        
        .win-message {
            background: linear-gradient(135deg, #1a1a3e, #0d0d35);
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 30px 25px;
            text-align: center;
            color: white;
            box-shadow: 0 0 80px rgba(255,215,0,0.5);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 320px;
            width: 90%;
        }
        
        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
        
        .win-message .prize-icon {
            font-size: 60px;
            display: block;
            animation: bounce 0.5s ease infinite alternate;
        }
        
        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }
        
        .win-message h2 {
            font-size: 22px;
            margin: 8px 0;
            color: #ffd700;
        }
        
        .win-message p {
            font-size: 16px;
            margin-bottom: 15px;
            color: #ccc;
        }
        
        .close-btn {
            background: #ffd700;
            color: #0a0a1a;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
        }
        
        /* جزيئات ذهبية */
        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            z-index: 100;
            animation: fall linear forwards;
        }
        
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- نجوم الخلفية -->
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="bot-name">X-TEAM PRO</div>
        
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>
        
        <button class="spin-btn" id="spinBtn" onclick="startSpin()">🎰 دّور واربح!</button>
    </div>
    
    <div class="win-overlay" id="winOverlay">
        <div class="win-message">
            <span class="prize-icon" id="prizeIcon">💰</span>
            <h2>مبروك!</h2>
            <p id="prizeText">ربحت جائزة!</p>
            <button class="close-btn" onclick="closeWinAndSend()">تم 👍</button>
        </div>
    </div>

    <script>
        // ========== Telegram WebApp ==========
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id') || tg?.initDataUnsafe?.user?.id || '0';
        
        // ========== الجوائز الجديدة ==========
        const PRIZES = [
            { id: 1, label: '150,000 ل.س', icon: '💰', color: '#ffd700', weight: 0.5 },
            { id: 2, label: '100,000 ل.س', icon: '💰', color: '#ffa500', weight: 1 },
            { id: 3, label: '50,000 ل.س',  icon: '💎', color: '#ff6347', weight: 1.5 },
            { id: 4, label: '25,000 ل.س',  icon: '💵', color: '#32cd32', weight: 3 },
            { id: 5, label: '10,000 ل.س',  icon: '💸', color: '#1e90ff', weight: 14 },
            { id: 6, label: '5,000 ل.س',   icon: '🪙', color: '#9370db', weight: 20 },
            { id: 7, label: '1,000 ل.س',   icon: '🪙', color: '#00ced1', weight: 25 },
            { id: 8, label: '10% شحن',     icon: '📈', color: '#ff1493', weight: 20 },
            { id: 9, label: '20% شحن',     icon: '📈', color: '#ff8c00', weight: 15 },
        ];
        
        // ========== رسم العجلة ==========
        const SEGMENTS = PRIZES.length;
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = 180;
        
        let spinning = false;
        let currentAngle = 0;
        let targetPrize = null;
        
        function drawWheel(rotation = 0) {
            const arcSize = (2 * Math.PI) / SEGMENTS;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // الخلفية الداكنة
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius + 15, 0, 2 * Math.PI);
            ctx.fillStyle = '#0a0a2e';
            ctx.fill();
            
            // حلقة خارجية ذهبية
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius + 10, 0, 2 * Math.PI);
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 4;
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 15;
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            // الخانات
            for (let i = 0; i < SEGMENTS; i++) {
                const startAngle = i * arcSize + rotation;
                const endAngle = startAngle + arcSize;
                
                // رسم الخانة
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = PRIZES[i].color;
                ctx.fill();
                ctx.strokeStyle = '#0a0a2e';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // النص
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + arcSize / 2);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#fff';
                
                // الأيقونة
                ctx.font = 'bold 28px Arial';
                ctx.fillText(PRIZES[i].icon, radius * 0.55, -8);
                
                // النص
                ctx.font = 'bold 11px Arial';
                const lines = PRIZES[i].label.split(' ');
                if (lines.length > 1) {
                    ctx.fillText(lines[0], radius * 0.65, 8);
                    ctx.fillText(lines[1], radius * 0.65, 22);
                } else {
                    ctx.fillText(PRIZES[i].label, radius * 0.65, 15);
                }
                
                ctx.restore();
            }
            
            // المركز
            ctx.beginPath();
            ctx.arc(centerX, centerY, 38, 0, 2 * Math.PI);
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 38);
            gradient.addColorStop(0, '#1a1a3e');
            gradient.addColorStop(1, '#0a0a1a');
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 2;
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 8;
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            // X في المركز
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 30px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('X', centerX, centerY);
        }
        
        // ========== بدء الدوران ==========
        function startSpin() {
            if (spinning) return;
            
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            spinning = true;
            
            // اختيار جائزة بالأوزان
            const totalWeight = PRIZES.reduce((sum, p) => sum + p.weight, 0);
            let random = Math.random() * totalWeight;
            let winnerIndex = 0;
            for (let i = 0; i < PRIZES.length; i++) {
                random -= PRIZES[i].weight;
                if (random <= 0) {
                    winnerIndex = i;
                    break;
                }
            }
            targetPrize = PRIZES[winnerIndex];
            
            // حساب الزاوية
            const arcSize = 360 / SEGMENTS;
            const targetAngle = winnerIndex * arcSize + (arcSize / 2);
            const spins = 6 + Math.floor(Math.random() * 3);
            const totalRotation = spins * 360 + (360 - targetAngle);
            
            playTickSound();
            
            animateWheel(totalRotation).then(() => {
                stopTickSound();
                playWinSound();
                showWin(targetPrize);
                sendResult(targetPrize);
            });
        }
        
        // ========== تحريك ==========
        function animateWheel(totalRotation) {
            return new Promise((resolve) => {
                const duration = 4500;
                const startTime = performance.now();
                const startAngle = currentAngle;
                
                function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
                
                function animate(currentTime) {
                    const progress = Math.min((currentTime - startTime) / duration, 1);
                    currentAngle = startAngle + totalRotation * easeOutCubic(progress);
                    drawWheel((currentAngle * Math.PI) / 180);
                    
                    if (progress < 1) requestAnimationFrame(animate);
                    else { currentAngle = currentAngle % 360; resolve(); }
                }
                requestAnimationFrame(animate);
            });
        }
        
        // ========== أصوات ==========
        let tickInterval, audioCtx;
        
        function playTickSound() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let count = 0;
                tickInterval = setInterval(() => {
                    if (count < 40) {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.frequency.value = 600 + Math.random() * 300;
                        g.gain.value = 0.06;
                        o.start(); o.stop(audioCtx.currentTime + 0.03);
                        count++;
                    }
                }, 70);
            } catch(e) {}
        }
        
        function stopTickSound() { if (tickInterval) clearInterval(tickInterval); }
        
        function playWinSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                [523, 659, 784, 1047].forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.value = f; g.gain.value = 0.1;
                    o.start(audioCtx.currentTime + i * 0.12);
                    o.stop(audioCtx.currentTime + i * 0.12 + 0.25);
                });
            } catch(e) {}
        }
        
        // ========== عرض الفوز ==========
        function showWin(prize) {
            document.getElementById('prizeIcon').textContent = prize.icon;
            document.getElementById('prizeText').textContent = `ربحت ${prize.label}!`;
            document.getElementById('winOverlay').classList.add('show');
            createConfetti();
        }
        
        function closeWinAndSend() {
            document.getElementById('winOverlay').classList.remove('show');
            document.getElementById('spinBtn').disabled = false;
            spinning = false;
            document.querySelectorAll('.confetti').forEach(el => el.remove());
        }
        
        function sendResult(prize) {
            const data = JSON.stringify({
                action: 'spin_result',
                user_id: userId,
                prize_id: prize.id,
                prize_label: prize.label
            });
            if (tg && tg.sendData) tg.sendData(data);
        }
        
        // ========== جزيئات ==========
        function createConfetti() {
            const colors = ['#ffd700', '#ff8c00', '#ff4500', '#1e90ff', '#32cd32', '#ff1493'];
            for (let i = 0; i < 50; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = Math.random() * 100 + '%';
                el.style.top = -(Math.random() * 30) + 'px';
                el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                el.style.animationDelay = Math.random() * 2 + 's';
                el.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(el);
            }
        }
        
        // ========== نجوم الخلفية ==========
        function createStars() {
            const stars = document.getElementById('stars');
            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = (Math.random() * 3 + 1) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                stars.appendChild(star);
            }
        }
        
        // ========== بدء ==========
        createStars();
        drawWheel();
    </script>
</body>
</html>
